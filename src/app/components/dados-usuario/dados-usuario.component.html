<app-container>
  <mat-card class="card" appearance="outlined">

    <div class="loading-container" *ngIf="loading.loading()">
      <mat-progress-spinner mode="indeterminate" diameter="50">
      </mat-progress-spinner>
    </div>

    <ng-container *ngIf="!loading.loading()">
      <mat-card-header>
        <mat-card-title>Perfil</mat-card-title>
        <mat-card-subtitle>Olá, {{dadosUsuario?.full_name}}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form">
          <div class="row">
            <mat-form-field appearance="outline">
              <mat-label>Nome</mat-label>
              <input matInput formControlName="name">
              <mat-icon matSuffix>id_card</mat-icon>
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email">
              <mat-icon matSuffix>mail</mat-icon>
            </mat-form-field>
          </div>
          <div class="row">
            <mat-form-field appearance="outline" class="password-field">
              <mat-label>Enter your password</mat-label>
              <input matInput [type]="hide() ? 'password' : 'text'" formControlName="password" />
              <button matIconButton matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()">
                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>
            <mat-form-field appearance="outline" class="password-field">
              <mat-label>Enter your password</mat-label>
              <input matInput [type]="hide() ? 'password' : 'text'" formControlName="confirmPassword" />
              <button matIconButton matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide()">
                <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>
          </div>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <button mat-flat-button (click)="editarPerfil()" [disabled]="isEditing">Editar Perfil</button>
        <button mat-flat-button [disabled]="!isEditing" (click)="salvarAlteracoes()">Salvar Alterações</button>
      </mat-card-actions>
    </ng-container>
  </mat-card>
</app-container>
