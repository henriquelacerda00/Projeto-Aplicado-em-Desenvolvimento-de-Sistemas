<table mat-table *ngIf="formArray" [dataSource]="formArray.controls" class="mat-elevation-z8">

  <ng-container matColumnDef="size">
    <th mat-header-cell *matHeaderCellDef>
      {{'SIZE_TABLE.SIZE' | translate}}
    </th>
    <td mat-cell *matCellDef="let row">
      {{ row.get('size')?.value }}
    </td>
  </ng-container>

  <ng-container matColumnDef="g">
    <th mat-header-cell *matHeaderCellDef class="col-g">G</th>
    <td mat-cell *matCellDef="let row" class="col-g">
      <mat-form-field appearance="outline" class="size-field">
        <input matInput type="number" min="0" [formControl]="row.get('g')" />
      </mat-form-field>
    </td>
  </ng-container>

  <ng-container matColumnDef="percentage">
    <th mat-header-cell *matHeaderCellDef class="col-percentage">%</th>
    <td mat-cell *matCellDef="let row" class="col-percentage">
      {{ row.get('percentage')?.value }}%
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
